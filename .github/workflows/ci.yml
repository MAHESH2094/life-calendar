# .github/workflows/ci.yml
name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install ruff
      run: pip install ruff

    - name: Lint with ruff
      run: ruff check . --select E,F,W --ignore E501 --output-format=github

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        # python3-tk and xauth are common causes of matrix-only GUI test failures.
        sudo apt-get install -y xvfb xauth python3-tk

    - name: Verify GUI dependencies
      run: |
        python -c "import tkinter, PIL, screeninfo; print('GUI dependencies OK')"

    - name: Run tests with coverage
      run: |
        xvfb-run -a pytest -v --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      continue-on-error: true
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
