version: "3.9"
services:
  life-calendar:
    build: .
    container_name: life-calendar
    restart: unless-stopped
    volumes:
      # The host folder holds the config, log and generated PNG.
      # Use ./data for persistent storage across container rebuilds.
      - ./data:/app
    environment:
      - TZ=America/New_York   # adjust to your timezone if needed
