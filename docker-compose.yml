version: "3.9"
services:
  life-calendar:
    build: .
    container_name: life-calendar
    restart: unless-stopped
    volumes:
      # Persist runtime state without hiding application code in /app.
      - ./data:/app/data
    environment:
      - TZ=America/New_York   # adjust to your timezone if needed
      - LIFECALENDAR_DATA_DIR=/app/data
