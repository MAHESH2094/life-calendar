[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "dist", "build", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line-too-long (handled by code review)

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]  # allow test fixtures with same name
